<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedConsume | Login</title>
    <link rel="stylesheet" href="/css/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3209/3209993.png"
             alt="MedConsume Logo"
             style="width: 35px; vertical-align: middle; margin-right: 8px;">
    </div>
    <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About Us</a></li>
        <li><a href="/contact">Contact Us</a></li>
        <li><a href="/feedback">Feedback</a></li>
    </ul>
    <div class="nav-buttons">
        <a href="/login"><button class="login-btn">Login</button></a>
        <a href="/signup"><button class="signup-btn">Sign Up</button></a>
    </div>
</nav>


<section class="login-section">
    <div class="login-container">
        <div class="illustration-section">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png" alt="Login Illustration">
            <h3>Welcome Back!<br>Login to Continue.</h3>
        </div>


        <div class="form-section">
            <h2>Login to Your Account</h2>
            <form th:action="@{/login}" method="post">


                <select name="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>


                <input type="email" name="email" placeholder="Email address" required />
                <input type="password" name="password" placeholder="Password" required />

                <button type="submit">Login</button>

                <p class="signup-link">Don't have an account? <a href="/signup">Sign Up</a></p>

                <p th:if="${error}" th:text="${error}" style="color:red;"></p>
            </form>
        </div>
    </div>
</section>
</body>
</html>
