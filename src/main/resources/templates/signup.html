
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedConsume | Sign Up</title>
    <link rel="stylesheet" href="/css/signup.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3209/3209993.png"
             alt="MedConsume Logo"
             style="width: 35px; margin-right: 8px;">
        <span>MedConsume</span>
    </div>

    <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About Us</a></li>
        <li><a href="/contact">Contact Us</a></li>
        <li><a href="/feedback">Feedback</a></li>
    </ul>


</nav>

<section class="signup-section">
    <div class="signup-container">

        <div class="illustration-section">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Signup Illustration">
            <h3>Create Your Account.</h3>
        </div>


        <div class="form-section">
            <h2>Sign Up</h2>
            <form action="/signup" method="post">
                <input type="text" name="name" placeholder="Full Name" required />
                <input type="email" name="email" placeholder="Email Address" required />
                <input type="password" name="password" placeholder="Password" required />
                <button type="submit">Create Account</button>
            </form>
        </div>

    </div>
</section>

</body>
</html>
