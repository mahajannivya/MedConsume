<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Management</title>
    <link rel="stylesheet" href="/css/medicinesedit.css">
</head>
<body>

<div class="container">

    <h1 class="title">Medicine Management</h1>

    <!-- Add Medicine Form -->
    <div class="form-box add-box">
        <h2>Add Medicine</h2>
        <form action="/admins/addMedicine" method="post">
            <label>Medicine Name</label>
            <input type="text" name="medicine_name" required>

            <label>Category</label>
            <input type="text" name="category">

            <label>Classification</label>
            <input type="text" name="classification">

            <label>Indication</label>
            <input type="text" name="indication">

            <label>Manufacturer</label>
            <input type="text" name="manufacturer">

            <label>Status</label>
            <input type="text" name="status">

            <label>Strength</label>
            <input type="text" name="strength">

            <label>Storage Form</label>
            <input type="text" name="storage_form">

            <button type="submit" class="save-btn">Add Medicine</button>
        </form>
    </div>

    <!-- Delete Medicine Form -->
    <div class="form-box delete-box">
        <h2>Delete Medicine</h2>
        <form action="/admins/deleteMedicine" method="post">
            <label>Enter Medicine ID to Delete</label>
            <input type="number" name="id" required>
            <button type="submit" class="delete-btn">Delete Medicine</button>
        </form>
    </div>

    <!-- Success / Error Messages -->
    <div id="message"></div>

    <!-- Home Button -->
    <button onclick="window.location.href='/home'" class="home-btn">Go to Home</button>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    const messageDiv = document.getElementById('message');

    if(msg === 'added'){
        messageDiv.innerHTML = '<div class="success">Medicine added successfully!</div>';
    } else if(msg === 'deleted'){
        messageDiv.innerHTML = '<div class="success">Medicine deleted successfully!</div>';
    } else if(msg === 'notfound'){
        messageDiv.innerHTML = '<div class="error">Medicine ID not found!</div>';
    }
</script>

</body>
</html>
